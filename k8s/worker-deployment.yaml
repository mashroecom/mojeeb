---
# Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: mojeeb
  labels:
    app: mojeeb
    component: worker
    role: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mojeeb
      component: worker
      role: worker
  template:
    metadata:
      labels:
        app: mojeeb
        component: worker
        role: worker
    spec:
      containers:
      - name: worker
        image: mojeeb/worker:latest
        env:
        # Application Configuration
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: mojeeb-config
              key: NODE_ENV
        - name: WORKER_CONCURRENCY
          value: "5"

        # Database Configuration
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: DATABASE_URL
        - name: READ_REPLICA_URL
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: READ_REPLICA_URL

        # Redis Configuration
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: REDIS_URL

        # JWT Configuration
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: JWT_SECRET
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: JWT_REFRESH_SECRET
        - name: JWT_ACCESS_EXPIRY
          valueFrom:
            configMapKeyRef:
              name: mojeeb-config
              key: JWT_ACCESS_EXPIRY
        - name: JWT_REFRESH_EXPIRY
          valueFrom:
            configMapKeyRef:
              name: mojeeb-config
              key: JWT_REFRESH_EXPIRY

        # Email Configuration
        - name: EMAIL_HOST
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: EMAIL_HOST
        - name: EMAIL_PORT
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: EMAIL_PORT
        - name: EMAIL_USER
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: EMAIL_USER
        - name: EMAIL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: EMAIL_PASSWORD
        - name: EMAIL_FROM
          valueFrom:
            configMapKeyRef:
              name: mojeeb-config
              key: EMAIL_FROM

        # URLs
        - name: FRONTEND_URL
          valueFrom:
            configMapKeyRef:
              name: mojeeb-config
              key: FRONTEND_URL
        - name: API_URL
          valueFrom:
            configMapKeyRef:
              name: mojeeb-config
              key: API_URL

        # OpenAI Configuration
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: OPENAI_API_KEY

        # Google OAuth Configuration
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: GOOGLE_CLIENT_ID
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: GOOGLE_CLIENT_SECRET

        # WhatsApp Configuration
        - name: WHATSAPP_API_URL
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: WHATSAPP_API_URL
        - name: WHATSAPP_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: WHATSAPP_API_TOKEN

        # Payment Configuration
        - name: KASHIER_API_KEY
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: KASHIER_API_KEY
        - name: KASHIER_MERCHANT_ID
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: KASHIER_MERCHANT_ID

        # Feature Flags
        - name: ENABLE_WEBSOCKET
          value: "false"
        - name: ENABLE_QUEUE_PROCESSING
          value: "true"

        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pgrep -f node || pgrep -f worker
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1

        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pgrep -f node || pgrep -f worker
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
          successThreshold: 1

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

      # Spread pods across different nodes for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: component
                  operator: In
                  values:
                  - worker
              topologyKey: kubernetes.io/hostname
