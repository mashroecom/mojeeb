---
# Web Service
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: mojeeb
  labels:
    app: mojeeb
    component: web
    role: frontend
spec:
  type: ClusterIP
  selector:
    app: mojeeb
    component: web
    role: frontend
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP
  sessionAffinity: None

---
# Web Headless Service (for StatefulSet if needed later)
apiVersion: v1
kind: Service
metadata:
  name: web-headless
  namespace: mojeeb
  labels:
    app: mojeeb
    component: web
    role: frontend
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: mojeeb
    component: web
    role: frontend
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP
