---
# Web Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: mojeeb
  labels:
    app: mojeeb
    component: web
    role: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mojeeb
      component: web
      role: frontend
  template:
    metadata:
      labels:
        app: mojeeb
        component: web
        role: frontend
    spec:
      containers:
      - name: web
        image: mojeeb/web:latest
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        # Application Configuration
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: mojeeb-config
              key: NODE_ENV

        # URLs
        - name: NEXT_PUBLIC_API_URL
          valueFrom:
            configMapKeyRef:
              name: mojeeb-config
              key: NEXT_PUBLIC_API_URL
        - name: API_URL
          valueFrom:
            configMapKeyRef:
              name: mojeeb-config
              key: API_URL

        # Google OAuth Configuration (public client ID)
        - name: NEXT_PUBLIC_GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: GOOGLE_CLIENT_ID

        livenessProbe:
          httpGet:
            path: /
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1

        readinessProbe:
          httpGet:
            path: /
            port: 3000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
          successThreshold: 1

        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"

      # Spread pods across different nodes for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: component
                  operator: In
                  values:
                  - web
              topologyKey: kubernetes.io/hostname
