---
# Primary PostgreSQL Service (Read-Write)
apiVersion: v1
kind: Service
metadata:
  name: postgres-primary
  namespace: mojeeb
  labels:
    app: mojeeb
    component: postgres
    role: primary
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app: mojeeb
    component: postgres
    role: primary
  publishNotReadyAddresses: false

---
# Primary PostgreSQL Service Alias (for backward compatibility)
# This allows existing DATABASE_URL to work with "postgres" hostname
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: mojeeb
  labels:
    app: mojeeb
    component: postgres
    role: primary
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app: mojeeb
    component: postgres
    role: primary
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
# Read Replica PostgreSQL Service (Read-Only)
apiVersion: v1
kind: Service
metadata:
  name: postgres-replica
  namespace: mojeeb
  labels:
    app: mojeeb
    component: postgres
    role: replica
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app: mojeeb
    component: postgres
    role: replica
  publishNotReadyAddresses: false

---
# Read Replica Load Balancer Service
# This provides a single endpoint for read queries that distributes across all replicas
apiVersion: v1
kind: Service
metadata:
  name: postgres-read
  namespace: mojeeb
  labels:
    app: mojeeb
    component: postgres
    role: replica
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app: mojeeb
    component: postgres
    role: replica
  sessionAffinity: None  # Round-robin load balancing
