apiVersion: v1
kind: ConfigMap
metadata:
  name: mojeeb-config
  namespace: mojeeb
  labels:
    app: mojeeb
    component: config
data:
  # Application Configuration
  NODE_ENV: "production"
  API_PORT: "4000"
  WORKER_HEALTH_PORT: "4001"

  # JWT Configuration
  JWT_ACCESS_EXPIRY: "15m"
  JWT_REFRESH_EXPIRY: "7d"

  # Email Configuration
  EMAIL_FROM: "noreply@mojeeb.app"

  # Database Configuration (non-sensitive)
  POSTGRES_DB: "mojeeb"
  POSTGRES_USER: "mojeeb"

  # Redis Configuration (non-sensitive)
  REDIS_HOST: "redis-cluster"
  REDIS_PORT: "6379"

  # URLs (will be overridden per environment/region)
  FRONTEND_URL: "https://mojeeb.app"
  API_URL: "https://api.mojeeb.app"
  NEXT_PUBLIC_API_URL: "https://api.mojeeb.app/api/v1"

  # Worker Configuration
  ENABLE_WORKERS: "false"

  # Feature Flags
  ENABLE_WEBSOCKET: "true"
  ENABLE_QUEUE_PROCESSING: "true"
