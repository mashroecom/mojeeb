---
# API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: mojeeb
  labels:
    app: mojeeb
    component: api
    role: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mojeeb
      component: api
      role: backend
  template:
    metadata:
      labels:
        app: mojeeb
        component: api
        role: backend
    spec:
      containers:
      - name: api
        image: mojeeb/api:latest
        ports:
        - containerPort: 4000
          name: http
          protocol: TCP
        env:
        # Application Configuration
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: mojeeb-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: mojeeb-config
              key: API_PORT

        # Database Configuration
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: DATABASE_URL
        - name: READ_REPLICA_URL
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: READ_REPLICA_URL

        # Redis Configuration
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: REDIS_URL

        # JWT Configuration
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: JWT_SECRET
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: JWT_REFRESH_SECRET
        - name: JWT_ACCESS_EXPIRY
          valueFrom:
            configMapKeyRef:
              name: mojeeb-config
              key: JWT_ACCESS_EXPIRY
        - name: JWT_REFRESH_EXPIRY
          valueFrom:
            configMapKeyRef:
              name: mojeeb-config
              key: JWT_REFRESH_EXPIRY

        # Email Configuration
        - name: EMAIL_HOST
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: EMAIL_HOST
        - name: EMAIL_PORT
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: EMAIL_PORT
        - name: EMAIL_USER
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: EMAIL_USER
        - name: EMAIL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: EMAIL_PASSWORD
        - name: EMAIL_FROM
          valueFrom:
            configMapKeyRef:
              name: mojeeb-config
              key: EMAIL_FROM

        # URLs
        - name: FRONTEND_URL
          valueFrom:
            configMapKeyRef:
              name: mojeeb-config
              key: FRONTEND_URL
        - name: API_URL
          valueFrom:
            configMapKeyRef:
              name: mojeeb-config
              key: API_URL

        # OpenAI Configuration
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: OPENAI_API_KEY

        # Google OAuth Configuration
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: GOOGLE_CLIENT_ID
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: GOOGLE_CLIENT_SECRET

        # WhatsApp Configuration
        - name: WHATSAPP_API_URL
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: WHATSAPP_API_URL
        - name: WHATSAPP_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: WHATSAPP_API_TOKEN

        # Payment Configuration
        - name: KASHIER_API_KEY
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: KASHIER_API_KEY
        - name: KASHIER_MERCHANT_ID
          valueFrom:
            secretKeyRef:
              name: mojeeb-secrets
              key: KASHIER_MERCHANT_ID

        # Feature Flags
        - name: ENABLE_WEBSOCKET
          valueFrom:
            configMapKeyRef:
              name: mojeeb-config
              key: ENABLE_WEBSOCKET
        - name: ENABLE_QUEUE_PROCESSING
          valueFrom:
            configMapKeyRef:
              name: mojeeb-config
              key: ENABLE_QUEUE_PROCESSING

        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 4000
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1

        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: 4000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
          successThreshold: 1

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

        volumeMounts:
        - name: uploads
          mountPath: /app/apps/api/uploads

      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: api-uploads-pvc

      # Spread pods across different nodes for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: component
                  operator: In
                  values:
                  - api
              topologyKey: kubernetes.io/hostname

---
# Persistent Volume Claim for API uploads
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: api-uploads-pvc
  namespace: mojeeb
  labels:
    app: mojeeb
    component: api
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
