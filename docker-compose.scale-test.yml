# Docker Compose configuration for horizontal scaling tests
# This is a simplified version of docker-compose.prod.yml for local testing
# without SSL certificates

version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx-local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    expose:
      - "4000"
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://mojeeb:${POSTGRES_PASSWORD:-mojeeb123}@postgres:5432/mojeeb?schema=public
      - READ_REPLICA_URL=postgresql://mojeeb:${POSTGRES_PASSWORD:-mojeeb123}@postgres-replica:5432/mojeeb?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      - PORT=4000
    depends_on:
      postgres:
        condition: service_healthy
      postgres-replica:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    expose:
      - "3000"
    env_file: .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost/api/v1
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    depends_on:
      - api
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.worker
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://mojeeb:${POSTGRES_PASSWORD:-mojeeb123}@postgres:5432/mojeeb?schema=public
      - READ_REPLICA_URL=postgresql://mojeeb:${POSTGRES_PASSWORD:-mojeeb123}@postgres-replica:5432/mojeeb?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      postgres-replica:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: mojeeb
      POSTGRES_USER: mojeeb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mojeeb123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mojeeb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-replica:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: mojeeb
      POSTGRES_USER: mojeeb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mojeeb123}
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mojeeb"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  postgres_replica_data:
  redis_data:
