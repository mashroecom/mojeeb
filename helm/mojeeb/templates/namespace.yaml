apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.global.namespace }}
  labels:
    app: mojeeb
    environment: {{ .Values.global.environment }}
    {{- if .Values.global.region }}
    region: {{ .Values.global.region }}
    {{- end }}
    {{- if .Values.global.dataResidency.enabled }}
    data-residency: {{ .Values.global.dataResidency.country }}
    compliance-level: {{ .Values.global.dataResidency.complianceLevel }}
    {{- end }}
