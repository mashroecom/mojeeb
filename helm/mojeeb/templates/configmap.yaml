apiVersion: v1
kind: ConfigMap
metadata:
  name: mojeeb-config
  namespace: {{ .Values.global.namespace }}
  labels:
    app: mojeeb
    component: config
data:
  # Application Configuration
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  API_PORT: {{ .Values.api.service.port | quote }}
  WORKER_HEALTH_PORT: {{ .Values.worker.healthPort | quote }}

  # JWT Configuration
  JWT_ACCESS_EXPIRY: {{ .Values.config.jwt.accessExpiry | quote }}
  JWT_REFRESH_EXPIRY: {{ .Values.config.jwt.refreshExpiry | quote }}

  # Email Configuration
  EMAIL_FROM: {{ .Values.config.email.from | quote }}

  # Database Configuration (non-sensitive)
  POSTGRES_DB: {{ .Values.postgresql.auth.database | quote }}
  POSTGRES_USER: {{ .Values.postgresql.auth.username | quote }}

  # Redis Configuration (non-sensitive)
  REDIS_HOST: "redis-cluster"
  REDIS_PORT: {{ .Values.redis.service.port | quote }}

  # URLs
  FRONTEND_URL: {{ .Values.config.urls.frontend | quote }}
  API_URL: {{ .Values.config.urls.api | quote }}
  NEXT_PUBLIC_API_URL: {{ .Values.config.urls.apiPublic | quote }}

  # Worker Configuration
  ENABLE_WORKERS: "false"

  # Feature Flags
  ENABLE_WEBSOCKET: {{ .Values.api.features.websocket | quote }}
  ENABLE_QUEUE_PROCESSING: {{ .Values.api.features.queueProcessing | quote }}
