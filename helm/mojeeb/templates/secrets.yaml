apiVersion: v1
kind: Secret
metadata:
  name: mojeeb-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    app: mojeeb
    component: secrets
type: Opaque
stringData:
  # ========================
  # Application
  # ========================
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  API_PORT: {{ .Values.api.service.port | quote }}
  FRONTEND_URL: {{ .Values.config.urls.frontend | quote }}
  API_URL: {{ .Values.config.urls.api | quote }}
  NEXT_PUBLIC_API_URL: {{ .Values.config.urls.apiPublic | quote }}

  # ========================
  # Database
  # ========================
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  READ_REPLICA_URL: {{ .Values.secrets.readReplicaUrl | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}

  # ========================
  # Redis
  # ========================
  REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | quote }}

  # ========================
  # JWT Authentication
  # ========================
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  JWT_REFRESH_SECRET: {{ .Values.secrets.jwtRefreshSecret | quote }}
  JWT_ACCESS_EXPIRY: {{ .Values.config.jwt.accessExpiry | quote }}
  JWT_REFRESH_EXPIRY: {{ .Values.config.jwt.refreshExpiry | quote }}

  # ========================
  # Encryption
  # ========================
  ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | quote }}

  # ========================
  # AI Providers
  # ========================
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}

  # ========================
  # Email
  # ========================
  EMAIL_HOST: {{ .Values.secrets.emailHost | quote }}
  EMAIL_PORT: {{ .Values.secrets.emailPort | quote }}
  EMAIL_USER: {{ .Values.secrets.emailUser | quote }}
  EMAIL_PASSWORD: {{ .Values.secrets.emailPassword | quote }}

  # ========================
  # Google OAuth
  # ========================
  GOOGLE_CLIENT_ID: {{ .Values.secrets.googleClientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.googleClientSecret | quote }}

  # ========================
  # WhatsApp
  # ========================
  WHATSAPP_API_URL: {{ .Values.secrets.whatsappApiUrl | quote }}
  WHATSAPP_API_TOKEN: {{ .Values.secrets.whatsappApiToken | quote }}

  # ========================
  # Kashier Payment
  # ========================
  KASHIER_MERCHANT_ID: {{ .Values.secrets.kashierMerchantId | quote }}
  KASHIER_API_KEY: {{ .Values.secrets.kashierApiKey | quote }}
